version: '3.8'

# Full Backend Stack (API + Databases)
# Usage:
#   docker compose -f docker-compose.api.yml up --build

services:
  fundlens-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fundlens-api:latest
    ports:
      - "${PORT:-8000}:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      FUNDLENS_DATA_DIR: /app/data
      FUNDLENS_AUTO_SEED: "1"
      SERVE_FRONTEND: "0"
      PORT: "8000"
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      POSTGRES_URL: postgresql://postgres:fundlens123@postgres:5432/fundlens
      NEO4J_URI: bolt://neo4j:7687

    restart: unless-stopped
    depends_on:
      - postgres
      - neo4j
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fundlens
      POSTGRES_PASSWORD: fundlens123
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-enterprise
    environment:
      NEO4J_AUTH: neo4j/fundlens123
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      - zookeeper

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  neo4j_data:
  postgres_data:
