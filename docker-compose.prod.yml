# Production-style local run (matches Render single-container deploy)
# Usage:
#   cp .env.example .env   # set GEMINI_API_KEY
#   docker compose -f docker-compose.prod.yml up --build

services:
  fundlens:
    build:
      context: .
      dockerfile: Dockerfile
    image: fundlens:latest
    ports:
      - "${PORT:-8000}:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      FUNDLENS_DATA_DIR: /data
      FUNDLENS_AUTO_SEED: "1"
      SERVE_FRONTEND: "1"
      PORT: "8000"
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    volumes:
      - fundlens_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

volumes:
  fundlens_data:
